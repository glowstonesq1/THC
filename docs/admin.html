<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — The HatchOut Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #543787;
      --purple-light: #a5b7e5;
      --yellow: #fff4c6;
      --teal: #7cb8c1;
      --coral: #ff865b;
      --amber: #feb737;
      --cream: #f6f6ea;
      --dark: #1a1a1a;
      --mid: #555;
      --light: #999;
      --border: #e8e8e0;
      --font-serif: 'Libre Baskerville', Georgia, serif;
      --font-sans: 'Quicksand', sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
    }

    /* LOGIN SCREEN */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--purple);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-box {
      background: var(--cream);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-logo {
      font-family: var(--font-serif);
      font-size: 28px;
      color: var(--purple);
      margin-bottom: 8px;
    }

    .login-sub {
      font-size: 13px;
      color: var(--light);
      margin-bottom: 32px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .login-box input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 15px;
      background: #fff;
      color: var(--dark);
      margin-bottom: 16px;
      transition: border-color 0.2s;
      outline: none;
    }

    .login-box input:focus { border-color: var(--purple); }

    .login-box input[type="password"] { letter-spacing: 0.2em; }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .login-btn:hover { opacity: 0.85; }

    .login-error {
      margin-top: 12px;
      font-size: 13px;
      color: var(--coral);
      min-height: 18px;
    }

    /* ADMIN LAYOUT */
    #admin-app { display: none; }
    #admin-app.visible { display: block; }

    .admin-header {
      background: var(--purple);
      color: #fff;
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .admin-header-logo {
      font-family: var(--font-serif);
      font-size: 20px;
      letter-spacing: 0.02em;
    }

    .admin-header-logo span {
      font-size: 12px;
      opacity: 0.6;
      margin-left: 10px;
      font-family: var(--font-sans);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-outline-white {
      padding: 8px 16px;
      border: 1.5px solid rgba(255,255,255,0.4);
      border-radius: 6px;
      background: transparent;
      color: #fff;
      font-family: var(--font-sans);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-outline-white:hover { background: rgba(255,255,255,0.12); }

    .btn-logout {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-family: var(--font-sans);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    .admin-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 40px 80px;
    }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      border: 1px solid var(--border);
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--light);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: var(--font-serif);
      font-size: 36px;
      color: var(--purple);
      line-height: 1;
    }

    .stat-sub {
      font-size: 12px;
      color: var(--light);
      margin-top: 6px;
    }

    /* SECTION HEADER */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-title {
      font-family: var(--font-serif);
      font-size: 22px;
      color: var(--dark);
    }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-add:hover { opacity: 0.85; }

    /* TRIPS TABLE */
    .trips-table-wrap {
      background: #fff;
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      margin-bottom: 40px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      padding: 14px 20px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--light);
      background: #fafaf6;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafaf6; }

    tbody td {
      padding: 16px 20px;
      font-size: 14px;
      vertical-align: middle;
    }

    .trip-title-cell strong {
      display: block;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .trip-title-cell span {
      font-size: 12px;
      color: var(--light);
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .status-upcoming { background: #e8f4fd; color: #2563eb; }
    .status-open { background: #dcfce7; color: #16a34a; }
    .status-full { background: #fef9c3; color: #ca8a04; }
    .status-past { background: #f3f4f6; color: #6b7280; }

    .spot-bar-mini {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spot-bar-mini .bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: visible;
      position: relative;
    }

    .spot-bar-mini .fill {
      height: 100%;
      background: var(--purple);
      border-radius: 3px;
      transition: width 0.3s;
    }

    .spot-bar-mini .marker {
      position: absolute;
      top: -3px;
      width: 2px;
      height: 12px;
      background: var(--amber);
      border-radius: 1px;
    }

    .spot-bar-mini .count {
      font-size: 12px;
      color: var(--mid);
      white-space: nowrap;
    }

    .action-btns {
      display: flex;
      gap: 8px;
    }

    .btn-edit {
      padding: 6px 14px;
      border: 1.5px solid var(--purple);
      border-radius: 6px;
      background: transparent;
      color: var(--purple);
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-edit:hover { background: var(--purple); color: #fff; }

    .btn-delete {
      padding: 6px 14px;
      border: 1.5px solid #fca5a5;
      border-radius: 6px;
      background: transparent;
      color: #ef4444;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-delete:hover { background: #ef4444; color: #fff; border-color: #ef4444; }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--cream);
      border-radius: 20px;
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 40px;
      transform: translateY(20px);
      transition: transform 0.25s;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .modal-title {
      font-family: var(--font-serif);
      font-size: 24px;
      color: var(--dark);
    }

    .modal-subtitle {
      font-size: 13px;
      color: var(--light);
      margin-top: 4px;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--mid);
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .modal-close:hover { background: var(--dark); color: #fff; border-color: var(--dark); }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mid);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 14px;
      background: #fff;
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--purple); }

    .form-group textarea { resize: vertical; min-height: 80px; }

    .spots-section {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-top: 4px;
    }

    .spots-section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--mid);
      margin-bottom: 16px;
    }

    .spots-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .spots-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .spots-item label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--light);
    }

    .spots-item input {
      padding: 10px 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      color: var(--purple);
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    .spots-item input:focus { border-color: var(--purple); }

    .spots-preview {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .spots-preview-label {
      font-size: 11px;
      color: var(--light);
      margin-bottom: 8px;
    }

    .spot-bar-large {
      position: relative;
      height: 10px;
      background: var(--border);
      border-radius: 5px;
      overflow: visible;
    }

    .spot-bar-large .fill {
      height: 100%;
      background: var(--purple);
      border-radius: 5px;
      transition: width 0.4s;
    }

    .spot-bar-large .marker {
      position: absolute;
      top: -4px;
      width: 3px;
      height: 18px;
      background: var(--amber);
      border-radius: 1px;
      transition: left 0.4s;
    }

    .spots-text {
      font-size: 12px;
      color: var(--mid);
      margin-top: 8px;
    }

    .highlights-section { margin-top: 4px; }

    .highlights-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .highlight-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .highlight-item input {
      flex: 1;
      padding: 10px 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 13px;
      background: #fff;
      color: var(--dark);
      outline: none;
      transition: border-color 0.2s;
    }

    .highlight-item input:focus { border-color: var(--purple); }

    .btn-remove-highlight {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid #fca5a5;
      background: transparent;
      color: #ef4444;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .btn-remove-highlight:hover { background: #ef4444; color: #fff; border-color: #ef4444; }

    .btn-add-highlight {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: transparent;
      border: 1.5px dashed var(--purple-light);
      border-radius: 8px;
      color: var(--purple);
      font-family: var(--font-sans);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
      width: 100%;
      justify-content: center;
    }

    .btn-add-highlight:hover { background: #f0eaf8; border-style: solid; }

    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .btn-cancel {
      padding: 12px 24px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--mid);
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel:hover { border-color: var(--dark); color: var(--dark); }

    .btn-save {
      padding: 12px 28px;
      border: none;
      border-radius: 8px;
      background: var(--purple);
      color: #fff;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-save:hover { opacity: 0.85; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--dark);
      color: #fff;
      padding: 14px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success { background: #16a34a; }
    .toast.error { background: #ef4444; }

    /* CONFIRM DIALOG */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .confirm-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .confirm-box {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      max-width: 360px;
      width: 100%;
      text-align: center;
    }

    .confirm-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    .confirm-title {
      font-family: var(--font-serif);
      font-size: 20px;
      margin-bottom: 8px;
    }

    .confirm-text {
      font-size: 14px;
      color: var(--mid);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .confirm-btns {
      display: flex;
      gap: 10px;
    }

    .confirm-btns button {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-confirm-cancel {
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--mid);
    }

    .btn-confirm-delete {
      border: none;
      background: #ef4444;
      color: #fff;
    }

    .btn-confirm-delete:hover, .btn-confirm-cancel:hover { opacity: 0.8; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .admin-header { padding: 0 20px; }
      .admin-main { padding: 24px 20px 60px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .spots-grid { grid-template-columns: repeat(3, 1fr); }
      .modal { padding: 28px 20px; }
      table { font-size: 13px; }
      thead th, tbody td { padding: 12px 12px; }
    }

    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; }
      .stat-value { font-size: 28px; }
      .trips-table-wrap { overflow-x: auto; }
      table { min-width: 600px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">THC Admin</div>
      <div class="login-sub">The HatchOut Club</div>
      <input type="text" id="login-user" placeholder="Username" autocomplete="off" />
      <input type="password" id="login-pass" placeholder="Password" />
      <button class="login-btn" onclick="doLogin()">Enter Dashboard</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- ADMIN APP -->
  <div id="admin-app">

    <header class="admin-header">
      <div class="admin-header-logo">
        THC Admin <span>The HatchOut Club</span>
      </div>
      <div class="header-actions">
        <a href="index.html" class="btn-outline-white" target="_blank">
          &#8599; View Site
        </a>
        <button class="btn-logout" onclick="doLogout()">Logout</button>
      </div>
    </header>

    <main class="admin-main">

      <!-- STATS -->
      <div class="stats-row" id="stats-row"></div>

      <!-- TRIPS TABLE -->
      <div class="section-header">
        <h2 class="section-title">All Trips</h2>
        <button class="btn-add" onclick="openAddModal()">
          <span style="font-size:18px;line-height:1;">+</span> Add Trip
        </button>
      </div>

      <div class="trips-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Trip</th>
              <th>Dates</th>
              <th>Price</th>
              <th>Status</th>
              <th>Spots</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="trips-tbody"></tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- EDIT/ADD MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="modal-title">Edit Trip</div>
          <div class="modal-subtitle" id="modal-subtitle">Update trip details</div>
        </div>
        <button class="modal-close" onclick="closeModal()">&#215;</button>
      </div>

      <form id="trip-form" onsubmit="saveTrip(event)">
        <input type="hidden" id="trip-id" />

        <div class="form-grid">
          <div class="form-group">
            <label>Trip Title</label>
            <input type="text" id="f-title" required placeholder="e.g. Bali Soul Immersion" />
          </div>
          <div class="form-group">
            <label>Destination</label>
            <input type="text" id="f-destination" required placeholder="e.g. Bali, Indonesia" />
          </div>
          <div class="form-group full">
            <label>Tagline</label>
            <input type="text" id="f-tagline" placeholder="Short poetic tagline" />
          </div>
          <div class="form-group full">
            <label>Description</label>
            <textarea id="f-description" rows="3" placeholder="Trip description..."></textarea>
          </div>
          <div class="form-group">
            <label>Dates</label>
            <input type="text" id="f-dates" placeholder="e.g. September 12–22, 2025" />
          </div>
          <div class="form-group">
            <label>Duration</label>
            <input type="text" id="f-duration" placeholder="e.g. 10 nights" />
          </div>
          <div class="form-group">
            <label>Price</label>
            <input type="text" id="f-price" placeholder="e.g. ₹1,20,000" />
          </div>
          <div class="form-group">
            <label>Category</label>
            <select id="f-category">
              <option value="all">All (Everyone)</option>
              <option value="young-wild">Young & Wild</option>
              <option value="old-wise">Old & Wise</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="f-status">
              <option value="upcoming">Upcoming</option>
              <option value="open">Open</option>
              <option value="full">Full</option>
              <option value="past">Past</option>
            </select>
          </div>

          <!-- SPOTS -->
          <div class="form-group full">
            <label>Spot Management</label>
            <div class="spots-section">
              <div class="spots-section-title">Availability Settings</div>
              <div class="spots-grid">
                <div class="spots-item">
                  <label>Total Spots</label>
                  <input type="number" id="f-spots-total" min="1" max="100" value="16"
                    oninput="updateSpotPreview()" />
                </div>
                <div class="spots-item">
                  <label>Available</label>
                  <input type="number" id="f-spots-available" min="0" max="100" value="4"
                    oninput="updateSpotPreview()" />
                </div>
                <div class="spots-item">
                  <label>Min Required</label>
                  <input type="number" id="f-spots-required" min="1" max="100" value="8"
                    oninput="updateSpotPreview()" />
                </div>
              </div>
              <div class="spots-preview">
                <div class="spots-preview-label">Availability bar preview</div>
                <div class="spot-bar-large">
                  <div class="fill" id="spot-fill"></div>
                  <div class="marker" id="spot-marker"></div>
                </div>
                <div class="spots-text" id="spots-text"></div>
              </div>
            </div>
          </div>

          <!-- HIGHLIGHTS -->
          <div class="form-group full">
            <label>Trip Highlights</label>
            <div class="highlights-section">
              <div class="highlights-list" id="highlights-list"></div>
              <button type="button" class="btn-add-highlight" onclick="addHighlight('')">
                + Add Highlight
              </button>
            </div>
          </div>

        </div>

        <div class="modal-footer">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-save" id="save-btn">Save Trip</button>
        </div>
      </form>
    </div>
  </div>

  <!-- CONFIRM DELETE -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <div class="confirm-icon">&#128465;</div>
      <div class="confirm-title">Delete Trip?</div>
      <div class="confirm-text" id="confirm-text">This action cannot be undone.</div>
      <div class="confirm-btns">
        <button class="btn-confirm-cancel" onclick="closeConfirm()">Cancel</button>
        <button class="btn-confirm-delete" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    const DEFAULT_TRIPS = [
      { id:'bali-2025', title:'Bali Soul Immersion', destination:'Bali, Indonesia', tagline:'Where the island breathes you in', description:'Rice terraces, temple ceremonies, volcano sunrises and family dinners in the heart of Ubud. A journey inward disguised as a trip outward.', dates:'September 12–22, 2025', duration:'10 nights', spotsTotal:16, spotsAvailable:4, spotsRequired:8, price:'₹1,20,000', status:'upcoming', highlights:['Ubud jungle stay','Mount Batur sunrise hike','Cooking class','Waterfall day','Balinese healing ritual'], category:'young-wild' },
      { id:'rajasthan-2025', title:'Royal Rajasthan', destination:'Rajasthan, India', tagline:'Palaces, dunes & the magic of the desert', description:"Forts that tell stories, camels that carry your soul, and sunsets that make you forget your name. Rajasthan is not a place — it's a feeling.", dates:'October 3–10, 2025', duration:'7 nights', spotsTotal:20, spotsAvailable:11, spotsRequired:10, price:'₹55,000', status:'upcoming', highlights:['Jaisalmer desert camp','Mehrangarh Fort','Blue City walk','Camel safari','Heritage hotel stay'], category:'old-wise' },
      { id:'greece-2025', title:'Greek Island Hopping', destination:'Athens · Santorini · Mykonos', tagline:'Gods, cliffs & infinite blue', description:'Three islands. Twelve strangers. One soul tribe by the end. The Aegean will do that to you.', dates:'November 8–18, 2025', duration:'10 nights', spotsTotal:14, spotsAvailable:14, spotsRequired:8, price:'₹2,10,000', status:'open', highlights:['Santorini caldera views','Acropolis sunset','Mykonos beach clubs','Sailing day','Local taverna dinners'], category:'all' },
      { id:'spiti-2024', title:'Spiti Valley Expedition', destination:'Himachal Pradesh, India', tagline:'Cold desert, warm hearts', description:'At 4,000 metres, the air is thin but the connections are thick. Spiti strips you bare and gives you back something real.', dates:'August 2024', duration:'8 nights', spotsTotal:12, spotsAvailable:0, spotsRequired:6, price:'₹45,000', status:'past', highlights:['Key Monastery','Chandratal Lake','Village homestay','Stargazing camp','Pin Valley trek'], category:'young-wild' },
      { id:'vietnam-2024', title:'Vietnam North to South', destination:'Hanoi · Hoi An · Ho Chi Minh', tagline:'Pho, lanterns & million watt smiles', description:'Three cities that each have their own heartbeat. We moved slow, ate everything, and fell in love with Vietnam at every turn.', dates:'October 2024', duration:'12 nights', spotsTotal:16, spotsAvailable:0, spotsRequired:8, price:'₹95,000', status:'past', highlights:['Halong Bay cruise','Hoi An lantern festival','Street food tours','Mekong Delta','Cu Chi Tunnels'], category:'all' },
      { id:'portugal-2024', title:'Portugal & The Atlantic', destination:'Lisbon · Porto · Sintra · Algarve', tagline:'Fado, tiles & ocean wind', description:'Portugal moves at its own gentle pace. Slow mornings with pastel de nata, long evenings with Vinho Verde, and sunsets over the Atlantic that end conversations with silence.', dates:'June 2024', duration:'9 nights', spotsTotal:14, spotsAvailable:0, spotsRequired:8, price:'₹1,40,000', status:'past', highlights:['Sintra palace trail','Porto wine cave visit','Algarve sea caves','Fado evening','Tram 28 Lisbon'], category:'old-wise' },
    ];
    function getTrips() { try { const s = localStorage.getItem('thc_trips'); return s ? JSON.parse(s) : DEFAULT_TRIPS; } catch { return DEFAULT_TRIPS; } }
    function saveTrips(trips) { localStorage.setItem('thc_trips', JSON.stringify(trips)); }

    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'thc2025admin';

    let editingId = null;
    let deleteId = null;

    // ---- AUTH ----

    function doLogin() {
      const user = document.getElementById('login-user').value.trim();
      const pass = document.getElementById('login-pass').value;
      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        sessionStorage.setItem('thc_admin', '1');
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-app').classList.add('visible');
        renderAll();
      } else {
        document.getElementById('login-error').textContent = 'Invalid credentials. Try again.';
      }
    }

    document.getElementById('login-pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('login-user').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('login-pass').focus();
    });

    function doLogout() {
      sessionStorage.removeItem('thc_admin');
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('admin-app').classList.remove('visible');
      document.getElementById('login-user').value = '';
      document.getElementById('login-pass').value = '';
      document.getElementById('login-error').textContent = '';
    }

    if (sessionStorage.getItem('thc_admin') === '1') {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-app').classList.add('visible');
    }

    // ---- RENDER ----

    function renderAll() {
      const trips = getTrips();
      renderStats(trips);
      renderTable(trips);
    }

    function renderStats(trips) {
      const upcoming = trips.filter(t => t.status === 'upcoming' || t.status === 'open').length;
      const past = trips.filter(t => t.status === 'past').length;
      const totalSpots = trips.filter(t => t.status !== 'past')
        .reduce((s, t) => s + t.spotsAvailable, 0);
      const totalTravellers = trips.reduce((s, t) => s + (t.spotsTotal - t.spotsAvailable), 0);

      document.getElementById('stats-row').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total Trips</div>
          <div class="stat-value">${trips.length}</div>
          <div class="stat-sub">${upcoming} upcoming · ${past} past</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Open Spots</div>
          <div class="stat-value" style="color:var(--teal)">${totalSpots}</div>
          <div class="stat-sub">across upcoming trips</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Travellers</div>
          <div class="stat-value" style="color:var(--coral)">${totalTravellers}</div>
          <div class="stat-sub">spots filled so far</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Categories</div>
          <div class="stat-value" style="color:var(--amber)">3</div>
          <div class="stat-sub">Young Wild · Old Wise · All</div>
        </div>
      `;
    }

    function renderTable(trips) {
      const tbody = document.getElementById('trips-tbody');
      if (!trips.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--light)">No trips yet. Add your first trip!</td></tr>';
        return;
      }

      tbody.innerHTML = trips.map(trip => {
        const filled = trip.spotsTotal - trip.spotsAvailable;
        const fillPct = (filled / trip.spotsTotal) * 100;
        const minPct = (trip.spotsRequired / trip.spotsTotal) * 100;
        const statusClass = `status-${trip.status}`;

        return `
          <tr>
            <td class="trip-title-cell">
              <strong>${escHtml(trip.title)}</strong>
              <span>${escHtml(trip.destination)}</span>
            </td>
            <td>${escHtml(trip.dates || '—')}</td>
            <td>${escHtml(trip.price)}</td>
            <td><span class="status-badge ${statusClass}">${trip.status}</span></td>
            <td>
              <div class="spot-bar-mini">
                <div class="bar" style="min-width:80px">
                  <div class="fill" style="width:${fillPct}%"></div>
                  <div class="marker" style="left:calc(${minPct}% - 1px)"></div>
                </div>
                <div class="count">${trip.spotsAvailable}/${trip.spotsTotal}</div>
              </div>
            </td>
            <td>
              <div class="action-btns">
                <button class="btn-edit" onclick="openEditModal('${trip.id}')">Edit</button>
                <button class="btn-delete" onclick="openConfirm('${trip.id}', '${escHtml(trip.title).replace(/'/g, "\\'")}')">Delete</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    // ---- MODAL ----

    function openAddModal() {
      editingId = null;
      document.getElementById('modal-title').textContent = 'Add New Trip';
      document.getElementById('modal-subtitle').textContent = 'Fill in the trip details';
      document.getElementById('save-btn').textContent = 'Add Trip';
      document.getElementById('trip-id').value = '';

      // Reset form
      document.getElementById('f-title').value = '';
      document.getElementById('f-destination').value = '';
      document.getElementById('f-tagline').value = '';
      document.getElementById('f-description').value = '';
      document.getElementById('f-dates').value = '';
      document.getElementById('f-duration').value = '';
      document.getElementById('f-price').value = '';
      document.getElementById('f-category').value = 'all';
      document.getElementById('f-status').value = 'upcoming';
      document.getElementById('f-spots-total').value = 16;
      document.getElementById('f-spots-available').value = 16;
      document.getElementById('f-spots-required').value = 8;

      renderHighlights(['']);
      updateSpotPreview();
      openModal();
    }

    function openEditModal(id) {
      editingId = id;
      const trips = getTrips();
      const trip = trips.find(t => t.id === id);
      if (!trip) return;

      document.getElementById('modal-title').textContent = 'Edit Trip';
      document.getElementById('modal-subtitle').textContent = trip.title;
      document.getElementById('save-btn').textContent = 'Save Changes';
      document.getElementById('trip-id').value = trip.id;

      document.getElementById('f-title').value = trip.title;
      document.getElementById('f-destination').value = trip.destination;
      document.getElementById('f-tagline').value = trip.tagline || '';
      document.getElementById('f-description').value = trip.description || '';
      document.getElementById('f-dates').value = trip.dates || '';
      document.getElementById('f-duration').value = trip.duration || '';
      document.getElementById('f-price').value = trip.price;
      document.getElementById('f-category').value = trip.category;
      document.getElementById('f-status').value = trip.status;
      document.getElementById('f-spots-total').value = trip.spotsTotal;
      document.getElementById('f-spots-available').value = trip.spotsAvailable;
      document.getElementById('f-spots-required').value = trip.spotsRequired;

      renderHighlights(trip.highlights || []);
      updateSpotPreview();
      openModal();
    }

    function openModal() {
      document.getElementById('modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }

    // ---- HIGHLIGHTS ----

    function renderHighlights(list) {
      const container = document.getElementById('highlights-list');
      container.innerHTML = '';
      (list.length ? list : ['']).forEach(h => addHighlight(h, false));
    }

    function addHighlight(value, render = true) {
      if (render) {
        const container = document.getElementById('highlights-list');
        const item = document.createElement('div');
        item.className = 'highlight-item';
        item.innerHTML = `
          <input type="text" placeholder="Trip highlight..." value="${escHtml(value)}" />
          <button type="button" class="btn-remove-highlight" onclick="removeHighlight(this)">&#215;</button>
        `;
        container.appendChild(item);
      }
    }

    function removeHighlight(btn) {
      const container = document.getElementById('highlights-list');
      if (container.children.length > 1) {
        btn.closest('.highlight-item').remove();
      }
    }

    function getHighlights() {
      return Array.from(document.querySelectorAll('#highlights-list input'))
        .map(i => i.value.trim())
        .filter(Boolean);
    }

    // ---- SPOT PREVIEW ----

    function updateSpotPreview() {
      const total = parseInt(document.getElementById('f-spots-total').value) || 1;
      const available = parseInt(document.getElementById('f-spots-available').value) || 0;
      const required = parseInt(document.getElementById('f-spots-required').value) || 0;

      const filled = Math.max(0, total - available);
      const fillPct = Math.min(100, (filled / total) * 100);
      const minPct = Math.min(100, (required / total) * 100);

      document.getElementById('spot-fill').style.width = fillPct + '%';
      document.getElementById('spot-marker').style.left = `calc(${minPct}% - 1.5px)`;
      document.getElementById('spots-text').textContent =
        `${filled} filled · ${available} available · ${required} minimum required`;
    }

    // ---- SAVE ----

    function saveTrip(e) {
      e.preventDefault();
      const trips = getTrips();

      const id = document.getElementById('trip-id').value ||
        'trip-' + Date.now();

      const data = {
        id,
        title: document.getElementById('f-title').value.trim(),
        destination: document.getElementById('f-destination').value.trim(),
        tagline: document.getElementById('f-tagline').value.trim(),
        description: document.getElementById('f-description').value.trim(),
        dates: document.getElementById('f-dates').value.trim(),
        duration: document.getElementById('f-duration').value.trim(),
        price: document.getElementById('f-price').value.trim(),
        category: document.getElementById('f-category').value,
        status: document.getElementById('f-status').value,
        spotsTotal: parseInt(document.getElementById('f-spots-total').value) || 16,
        spotsAvailable: parseInt(document.getElementById('f-spots-available').value) || 0,
        spotsRequired: parseInt(document.getElementById('f-spots-required').value) || 8,
        highlights: getHighlights(),
      };

      if (editingId) {
        const idx = trips.findIndex(t => t.id === editingId);
        if (idx >= 0) trips[idx] = data;
      } else {
        trips.push(data);
      }

      saveTrips(trips);
      closeModal();
      renderAll();
      showToast(editingId ? 'Trip updated!' : 'Trip added!', 'success');
    }

    // ---- DELETE ----

    function openConfirm(id, title) {
      deleteId = id;
      document.getElementById('confirm-text').textContent =
        `Delete "${title}"? This cannot be undone.`;
      document.getElementById('confirm-overlay').classList.add('open');
    }

    function closeConfirm() {
      deleteId = null;
      document.getElementById('confirm-overlay').classList.remove('open');
    }

    function confirmDelete() {
      if (!deleteId) return;
      const trips = getTrips().filter(t => t.id !== deleteId);
      saveTrips(trips);
      closeConfirm();
      renderAll();
      showToast('Trip deleted.', 'error');
    }

    // ---- TOAST ----

    function showToast(msg, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ---- UTIL ----

    function escHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Init
    if (sessionStorage.getItem('thc_admin') === '1') renderAll();
  </script>
</body>
</html>
